name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      # 不配 registry-url：它写入的 .npmrc 引用 NODE_AUTH_TOKEN，
      # Trusted Publishing (OIDC) 免 token，npm >=11.5.1 自动走 id-token 交换
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          # 锁大版本与本地一致；latest 曾在 pnpm 11 要求 Node>=22.13 时炸过 CI
          version: '10'

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push origin HEAD:refs/heads/master

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      - name: Publish
        run: npm publish --provenance
